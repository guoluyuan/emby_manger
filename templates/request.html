<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>发现好片 - EmbyPulse</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: { 50: '#f0fdfa', 100: '#ccfbf1', 500: '#14b8a6', 600: '#0d9488', 900: '#134e4a' }
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', system-ui, sans-serif; }
        
        /* 玻璃面板适配双主题 */
        .glass-panel { background: rgba(255, 255, 255, 0.6); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.5); box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); }
        .dark .glass-panel { background: rgba(30, 41, 59, 0.7); border: 1px solid rgba(255, 255, 255, 0.05); box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2); }
        
        /* 隐藏滚动条 */
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* 卡片悬浮 */
        .poster-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .poster-card:hover { transform: scale(1.05); box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1), 0 8px 10px -6px rgba(0,0,0,0.1); z-index: 10; }
        .dark .poster-card:hover { box-shadow: 0 20px 25px -5px rgba(0,0,0,0.5), 0 8px 10px -6px rgba(0,0,0,0.5); }
        
        .bg-gradient-radial { background: radial-gradient(circle at center, var(--tw-gradient-stops)); }
        [x-cloak] { display: none !important; }
    </style>
</head>

<body class="antialiased min-h-screen relative pb-20 transition-colors duration-500 bg-slate-50 text-slate-800 dark:bg-[#0f172a] dark:text-slate-100" 
      x-data="requestApp()" 
      :class="{'dark': isDarkMode}"
      x-init="initTheme()">
    
    <div class="fixed inset-0 z-[-1] overflow-hidden pointer-events-none">
        <div class="absolute top-[-20%] left-[-10%] w-[70%] h-[70%] rounded-full blur-3xl opacity-60 dark:opacity-40 transition-colors duration-1000"
             :class="isDarkMode ? 'bg-gradient-radial from-indigo-900/40 to-transparent' : 'bg-gradient-radial from-teal-200/60 to-transparent'"></div>
        <div class="absolute bottom-[-20%] right-[-10%] w-[60%] h-[60%] rounded-full blur-3xl opacity-60 dark:opacity-40 transition-colors duration-1000"
             :class="isDarkMode ? 'bg-gradient-radial from-purple-900/30 to-transparent' : 'bg-gradient-radial from-blue-200/50 to-transparent'"></div>
    </div>

    <div x-show="!isLoggedIn && isLoaded" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-50/80 dark:bg-slate-900/80 backdrop-blur-sm" x-cloak>
        <div class="w-full max-w-md glass-panel rounded-3xl p-8 relative overflow-hidden">
            <div class="text-center mb-8 relative z-10">
                <span class="text-4xl block mb-2">🍿</span>
                <h2 class="text-2xl font-extrabold tracking-tight">EmbyPulse 求片大厅</h2>
                <p class="text-slate-500 dark:text-slate-400 mt-2 text-sm">请输入你的 Emby 账号密码</p>
            </div>
            <form @submit.prevent="login()" class="space-y-5 relative z-10">
                <div>
                    <input type="text" x-model="loginForm.username" placeholder="Emby 账号" required
                           class="w-full px-4 py-3 rounded-xl bg-white/50 dark:bg-black/20 border border-slate-200 dark:border-white/10 focus:ring-2 focus:ring-brand-500 outline-none transition-all placeholder-slate-400 dark:placeholder-slate-500">
                </div>
                <div>
                    <input type="password" x-model="loginForm.password" placeholder="Emby 密码" required
                           class="w-full px-4 py-3 rounded-xl bg-white/50 dark:bg-black/20 border border-slate-200 dark:border-white/10 focus:ring-2 focus:ring-brand-500 outline-none transition-all placeholder-slate-400 dark:placeholder-slate-500">
                </div>
                <button type="submit" :disabled="isLoggingIn" class="w-full py-3.5 rounded-xl font-bold text-white bg-gradient-to-r from-brand-500 to-blue-500 hover:from-brand-600 hover:to-blue-600 shadow-lg shadow-brand-500/30 transition-all flex items-center justify-center gap-2">
                    <span x-show="isLoggingIn" class="animate-spin w-5 h-5 border-2 border-white/30 border-t-white rounded-full"></span>
                    <span x-show="!isLoggingIn">进入大厅</span>
                </button>
            </form>
        </div>
    </div>

    <div x-show="isLoggedIn" x-transition.opacity.duration.500ms x-cloak>
        
        <nav class="fixed top-0 w-full z-40 glass-panel border-b border-slate-200/50 dark:border-white/5">
            <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <span class="text-2xl drop-shadow-md">🍿</span>
                    <h1 class="text-lg font-bold tracking-wide text-slate-800 dark:text-white">EmbyPulse</h1>
                </div>
                <div class="flex items-center gap-2">
                    <button @click="toggleTheme()" class="p-2 rounded-full hover:bg-slate-200 dark:hover:bg-white/10 text-slate-500 dark:text-slate-400 transition-colors">
                        <svg x-show="!isDarkMode" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
                        <svg x-show="isDarkMode" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
                    </button>
                    <button @click="logout()" class="text-sm font-medium px-3 py-1.5 rounded-full text-slate-500 dark:text-slate-400 hover:text-red-500 dark:hover:text-red-400 hover:bg-red-50 dark:hover:bg-red-500/10 transition-colors">
                        退出
                    </button>
                </div>
            </div>
        </nav>

        <main class="pt-24 max-w-7xl mx-auto px-4 pb-12">
            <div class="text-center py-8 space-y-3">
                <h2 class="text-3xl md:text-5xl font-extrabold tracking-tight">探索宇宙，一键追剧</h2>
                <p class="text-slate-500 dark:text-slate-400">输入片名，剩下的交给我们</p>
            </div>

            <div class="max-w-2xl mx-auto relative group">
                <div class="absolute -inset-1 bg-gradient-to-r from-brand-400 to-blue-500 rounded-full blur opacity-20 group-hover:opacity-40 dark:opacity-30 dark:group-hover:opacity-50 transition duration-500"></div>
                <form @submit.prevent="searchMedia()" class="relative flex items-center glass-panel rounded-full p-1.5 shadow-sm">
                    <div class="pl-4 text-slate-400"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg></div>
                    <input type="text" x-model="searchQuery" placeholder="搜索你想看的..." class="w-full bg-transparent border-none focus:ring-0 text-slate-800 dark:text-white placeholder-slate-400 dark:placeholder-slate-500 px-4 py-3 outline-none text-lg">
                    <button type="submit" class="bg-slate-800 text-white dark:bg-white dark:text-slate-900 px-6 py-2.5 rounded-full font-medium transition-transform active:scale-95 flex items-center gap-2 shadow-md">
                        <span x-show="!isSearching">搜索</span>
                        <svg x-show="isSearching" class="animate-spin h-5 w-5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                    </button>
                </form>
            </div>

            <div class="flex justify-center mt-10 mb-8">
                <div class="glass-panel p-1 rounded-full inline-flex relative w-64 shadow-inner dark:shadow-none bg-slate-200/50 dark:bg-transparent">
                    <div class="absolute inset-y-1 left-1 w-[calc(50%-4px)] bg-white dark:bg-slate-700/80 rounded-full transition-transform duration-300 ease-out shadow-sm border border-slate-200 dark:border-white/10" 
                         :class="currentTab === 'queue' ? 'translate-x-full' : 'translate-x-0'"></div>
                    <button @click="switchTab('explore')" class="flex-1 relative z-10 py-2 text-sm font-medium transition-colors" :class="currentTab === 'explore' ? 'text-brand-600 dark:text-white' : 'text-slate-500 hover:text-slate-800 dark:text-slate-400 dark:hover:text-slate-200'">🧭 大厅</button>
                    <button @click="switchTab('queue')" class="flex-1 relative z-10 py-2 text-sm font-medium transition-colors" :class="currentTab === 'queue' ? 'text-brand-600 dark:text-white' : 'text-slate-500 hover:text-slate-800 dark:text-slate-400 dark:hover:text-slate-200'">📝 队列</button>
                </div>
            </div>

            <div class="min-h-[500px]">
                
                <div x-show="currentTab === 'explore'" x-transition.opacity.duration.300ms>
                    
                    <div x-show="searchResults.length > 0" class="mb-10">
                        <div class="flex items-center justify-between mb-4">
                            <h3 class="text-xl font-bold flex items-center gap-2">🔍 搜索结果</h3>
                            <button @click="searchResults = []" class="text-sm text-slate-500 hover:text-brand-500">清除</button>
                        </div>
                        <div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-4 md:gap-6">
                            <template x-for="item in searchResults" :key="item.tmdb_id">
                                <div @click="openModal(item)" class="poster-card relative rounded-xl overflow-hidden cursor-pointer bg-slate-200 dark:bg-slate-800 aspect-[2/3] ring-1 ring-black/5 dark:ring-white/10 group shadow-sm">
                                    <img :src="item.poster_path || 'https://via.placeholder.com/500x750?text=No+Poster'" class="w-full h-full object-cover" loading="lazy">
                                    <div class="absolute inset-0 bg-gradient-to-t from-black/90 via-black/20 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-300 flex flex-col justify-end p-4">
                                        <div class="text-xs font-bold px-2 py-1 bg-brand-500 rounded text-white self-start mb-2" x-text="item.media_type === 'movie' ? '电影' : '剧集'"></div>
                                        <h4 class="font-bold text-white line-clamp-2" x-text="item.title"></h4>
                                        <div class="flex items-center justify-between mt-1 text-sm text-slate-300">
                                            <span x-text="item.year"></span>
                                            <span class="flex items-center gap-1 text-yellow-400">★ <span x-text="item.vote_average"></span></span>
                                        </div>
                                    </div>
                                    <div x-show="item.local_status === 2" class="absolute top-2 right-2 bg-green-500/90 backdrop-blur-md text-white text-xs px-2 py-1 rounded-full font-bold shadow-md border border-green-400">已入库</div>
                                </div>
                            </template>
                        </div>
                    </div>

                    <div x-show="searchResults.length === 0 && trendingMovies.length > 0" class="mb-10">
                        <h3 class="text-xl font-bold mb-4 flex items-center gap-2">🎬 本周热门电影</h3>
                        <div class="flex overflow-x-auto hide-scrollbar gap-4 pb-6 pt-2 -mx-4 px-4 snap-x">
                            <template x-for="item in trendingMovies" :key="item.tmdb_id">
                                <div @click="openModal(item)" class="poster-card flex-none w-32 md:w-44 relative rounded-xl overflow-hidden cursor-pointer bg-slate-200 dark:bg-slate-800 aspect-[2/3] ring-1 ring-black/5 dark:ring-white/10 snap-start group shadow-sm">
                                    <img :src="item.poster_path" class="w-full h-full object-cover" loading="lazy">
                                    <div class="absolute inset-0 bg-gradient-to-t from-black/90 via-transparent to-transparent opacity-100 md:opacity-0 group-hover:opacity-100 transition-opacity duration-300 flex flex-col justify-end p-3">
                                        <h4 class="font-bold text-white text-sm line-clamp-2 leading-tight" x-text="item.title"></h4>
                                        <span class="text-xs text-slate-300 mt-1 flex items-center gap-1 text-yellow-400">★ <span x-text="item.vote_average"></span></span>
                                    </div>
                                </div>
                            </template>
                        </div>
                    </div>

                    <div x-show="searchResults.length === 0 && trendingTv.length > 0" class="mb-8">
                        <h3 class="text-xl font-bold mb-4 flex items-center gap-2">📺 霸榜高分剧集</h3>
                        <div class="flex overflow-x-auto hide-scrollbar gap-4 pb-6 pt-2 -mx-4 px-4 snap-x">
                            <template x-for="item in trendingTv" :key="item.tmdb_id">
                                <div @click="openModal(item)" class="poster-card flex-none w-32 md:w-44 relative rounded-xl overflow-hidden cursor-pointer bg-slate-200 dark:bg-slate-800 aspect-[2/3] ring-1 ring-black/5 dark:ring-white/10 snap-start group shadow-sm">
                                    <img :src="item.poster_path" class="w-full h-full object-cover" loading="lazy">
                                    <div class="absolute inset-0 bg-gradient-to-t from-black/90 via-transparent to-transparent opacity-100 md:opacity-0 group-hover:opacity-100 transition-opacity duration-300 flex flex-col justify-end p-3">
                                        <h4 class="font-bold text-white text-sm line-clamp-2 leading-tight" x-text="item.title"></h4>
                                        <span class="text-xs text-slate-300 mt-1 flex items-center gap-1 text-yellow-400">★ <span x-text="item.vote_average"></span></span>
                                    </div>
                                </div>
                            </template>
                        </div>
                    </div>

                </div>

                <div x-show="currentTab === 'queue'" x-transition.opacity.duration.300ms x-cloak>
                    <div x-show="myQueue.length === 0" class="text-center py-20 text-slate-400 dark:text-slate-500">
                        <span class="text-6xl block mb-4 opacity-50">🛸</span>
                        <p>队列空空如也，去大厅许个愿吧</p>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <template x-for="item in myQueue" :key="item.tmdb_id">
                            <div class="glass-panel p-4 rounded-2xl flex gap-4 items-center">
                                <img :src="item.poster_path" class="w-20 rounded-lg shadow-md aspect-[2/3] object-cover bg-slate-200 dark:bg-slate-800">
                                <div class="flex-1">
                                    <h4 class="font-bold text-lg line-clamp-1" x-text="item.title"></h4>
                                    <div class="text-sm text-slate-500 dark:text-slate-400 mt-1 mb-3" x-text="item.media_type === 'tv' ? `${item.year} · 第 ${item.season} 季` : item.year"></div>
                                    
                                    <span x-show="item.status === 0" class="px-3 py-1 bg-slate-200 dark:bg-slate-700/50 text-slate-600 dark:text-slate-300 rounded-full text-xs font-medium border border-slate-300 dark:border-slate-600">审核中</span>
                                    <span x-show="item.status === 1" class="px-3 py-1 bg-blue-100 dark:bg-blue-500/20 text-blue-600 dark:text-blue-400 rounded-full text-xs font-medium border border-blue-200 dark:border-blue-500/30 inline-flex items-center gap-1.5"><span class="animate-pulse w-2 h-2 bg-blue-500 rounded-full"></span> 下载中</span>
                                    <span x-show="item.status === 2" class="px-3 py-1 bg-green-100 dark:bg-green-500/20 text-green-700 dark:text-green-400 rounded-full text-xs font-medium border border-green-300 dark:border-green-500/30">✅ 已入库</span>
                                    <span x-show="item.status === 3" class="px-3 py-1 bg-red-100 dark:bg-red-500/20 text-red-600 dark:text-red-400 rounded-full text-xs font-medium border border-red-300 dark:border-red-500/30">❌ 已拒绝</span>
                                </div>
                            </div>
                        </template>
                    </div>
                </div>

            </div>
        </main>
    </div>

    <div x-show="isModalOpen" class="fixed inset-0 z-50 flex items-end md:items-center justify-center p-0 md:p-4" x-cloak>
        <div x-show="isModalOpen" x-transition.opacity @click="closeModal()" class="absolute inset-0 bg-slate-900/60 dark:bg-black/70 backdrop-blur-sm"></div>
        
        <div x-show="isModalOpen" x-transition:enter="transition ease-out duration-300" x-transition:enter-start="opacity-0 translate-y-full md:translate-y-10 scale-95" x-transition:enter-end="opacity-100 translate-y-0 scale-100"
             class="relative w-full md:w-[600px] max-h-[90vh] bg-white dark:bg-slate-900 border border-slate-200 dark:border-white/10 rounded-t-3xl md:rounded-3xl overflow-hidden shadow-2xl flex flex-col">
            
            <div class="relative h-48 md:h-64 shrink-0 bg-slate-200 dark:bg-slate-800">
                <img :src="activeItem?.backdrop_path || activeItem?.poster_path" class="w-full h-full object-cover opacity-80 dark:opacity-60">
                <div class="absolute inset-0 bg-gradient-to-t from-white via-white/40 dark:from-slate-900 dark:via-slate-900/40 to-transparent"></div>
                <button @click="closeModal()" class="absolute top-4 right-4 bg-black/40 hover:bg-black/60 text-white rounded-full p-2 backdrop-blur-md transition">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>

            <div class="relative px-6 pb-6 pt-0 flex-1 overflow-y-auto hide-scrollbar -mt-16">
                <div class="flex gap-4 items-end mb-4">
                    <img :src="activeItem?.poster_path" class="w-24 md:w-32 rounded-xl shadow-xl ring-2 ring-white/50 dark:ring-white/10 relative z-10 aspect-[2/3] object-cover bg-slate-200 dark:bg-slate-800">
                    <div class="pb-2">
                        <h2 class="text-2xl md:text-3xl font-extrabold leading-tight text-slate-900 dark:text-white" x-text="activeItem?.title"></h2>
                        <div class="flex items-center gap-3 mt-2 text-sm text-slate-600 dark:text-slate-300">
                            <span class="px-2 py-0.5 bg-slate-200 dark:bg-white/10 rounded font-medium" x-text="activeItem?.media_type === 'movie' ? '电影' : '剧集'"></span>
                            <span x-text="activeItem?.year"></span>
                            <span class="flex items-center gap-1 text-yellow-500 dark:text-yellow-400 font-bold">★ <span x-text="activeItem?.vote_average"></span></span>
                        </div>
                    </div>
                </div>

                <p class="text-slate-600 dark:text-slate-300 text-sm leading-relaxed mb-6" x-text="activeItem?.overview || '暂无剧情简介...'"></p>

                <div x-show="activeItem?.media_type === 'tv'" class="mb-6 bg-slate-50 dark:bg-white/5 rounded-2xl p-4 border border-slate-200 dark:border-white/5">
                    <h4 class="text-sm font-bold mb-3 flex justify-between items-center text-slate-800 dark:text-white">
                        选择订阅季数
                        <span x-show="isLoadingSeasons" class="text-xs text-brand-500 dark:text-brand-400 animate-pulse">扫描媒体库中...</span>
                    </h4>
                    <div class="flex flex-wrap gap-2 max-h-32 overflow-y-auto hide-scrollbar">
                        <template x-for="s in tvSeasons" :key="s.season_number">
                            <button @click="if(!s.exists_locally) selectedSeason = s.season_number"
                                    class="px-4 py-2 rounded-xl text-sm font-medium transition-all border"
                                    :class="s.exists_locally ? 'bg-green-100 border-green-300 text-green-700 dark:bg-green-500/10 dark:border-green-500/30 dark:text-green-400 cursor-not-allowed' : (selectedSeason === s.season_number ? 'bg-brand-600 border-brand-500 text-white shadow-lg shadow-brand-500/40' : 'bg-white border-slate-300 text-slate-700 hover:bg-slate-50 dark:bg-slate-800 dark:border-slate-600 dark:text-slate-300 dark:hover:bg-slate-700')">
                                <span x-text="`第 ${s.season_number} 季`"></span>
                                <span x-show="s.exists_locally" class="ml-1 text-xs">✅</span>
                            </button>
                        </template>
                        <div x-show="!isLoadingSeasons && tvSeasons.length === 0" class="text-xs text-slate-400">该剧集暂无分季数据</div>
                    </div>
                </div>

                <button @click="submitRequest()" :disabled="isSubmitting || (activeItem?.media_type === 'tv' && !selectedSeason)"
                        class="w-full py-4 rounded-xl font-bold text-lg flex justify-center items-center gap-2 transition-all disabled:opacity-50 disabled:cursor-not-allowed text-white shadow-lg"
                        :class="(activeItem?.local_status === 2 && activeItem?.media_type !== 'tv') ? 'bg-green-600 shadow-green-600/30' : 'bg-slate-900 hover:bg-slate-800 dark:bg-brand-600 dark:hover:bg-brand-500 dark:shadow-brand-600/30'">
                    <span x-show="isSubmitting" class="animate-spin w-5 h-5 border-2 border-white/30 border-t-white rounded-full"></span>
                    <span x-show="!isSubmitting && activeItem?.local_status === 2 && activeItem?.media_type !== 'tv'">✅ 已在库中</span>
                    <span x-show="!isSubmitting && !(activeItem?.local_status === 2 && activeItem?.media_type !== 'tv')">🚀 发送求片心愿</span>
                </button>
            </div>
        </div>
    </div>

    <div x-show="toast.show" x-transition x-cloak class="fixed top-20 left-1/2 -translate-x-1/2 z-50 px-6 py-3 rounded-full shadow-2xl border backdrop-blur-md flex items-center gap-2 font-medium bg-white dark:bg-slate-800"
         :class="toast.type === 'success' ? 'border-green-300 text-green-700 dark:border-green-500/30 dark:text-green-400' : 'border-red-300 text-red-700 dark:border-red-500/30 dark:text-red-400'">
        <span x-text="toast.message"></span>
    </div>

    <script>
        document.addEventListener('alpine:init', () => {
            Alpine.data('requestApp', () => ({
                isLoaded: false,
                isLoggedIn: false,
                isDarkMode: false,
                loginForm: { username: '', password: '' },
                isLoggingIn: false,
                
                searchQuery: '',
                isSearching: false,
                currentTab: 'explore', 
                searchResults: [],
                trendingMovies: [],
                trendingTv: [],
                myQueue: [],
                
                isModalOpen: false,
                activeItem: null,
                tvSeasons: [],
                isLoadingSeasons: false,
                selectedSeason: null,
                isSubmitting: false,
                toast: { show: false, message: '', type: 'success' },

                async initTheme() {
                    // 默认白天模式。如果有本地存储记录，则按照记录显示
                    const savedTheme = localStorage.getItem('ep_theme');
                    if (savedTheme === 'dark') {
                        this.isDarkMode = true;
                    } else {
                        this.isDarkMode = false;
                    }
                    // 首次启动，静默检查是否登录
                    try {
                        const res = await fetch('/api/requests/check');
                        const data = await res.json();
                        if (data.status === 'success') {
                            this.isLoggedIn = true;
                            this.loadTrending();
                        }
                    } catch(e) {}
                    this.isLoaded = true;
                    
                    setInterval(() => { if (this.isLoggedIn && this.currentTab === 'queue') this.loadQueue(); }, 10000);
                },

                toggleTheme() {
                    this.isDarkMode = !this.isDarkMode;
                    localStorage.setItem('ep_theme', this.isDarkMode ? 'dark' : 'light');
                },

                showToast(msg, type = 'success') {
                    this.toast = { show: true, message: msg, type };
                    setTimeout(() => this.toast.show = false, 3000);
                },

                async login() {
                    if(!this.loginForm.username || !this.loginForm.password) return;
                    this.isLoggingIn = true;
                    try {
                        const res = await fetch('/api/requests/auth', {
                            method: 'POST', headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(this.loginForm)
                        });
                        const data = await res.json();
                        if (data.status === 'success') {
                            this.isLoggedIn = true;
                            this.loadTrending();
                            this.showToast('登录成功');
                        } else {
                            this.showToast(data.message, 'error');
                        }
                    } catch(e) { this.showToast('网络错误', 'error'); }
                    this.isLoggingIn = false;
                },

                async logout() {
                    try {
                        await fetch('/api/requests/logout', { method: 'POST' });
                        this.isLoggedIn = false;
                        this.loginForm.password = '';
                    } catch (e) {}
                },

                switchTab(tab) {
                    this.currentTab = tab;
                    if (tab === 'queue') this.loadQueue();
                },

                async loadTrending() {
                    try {
                        const res = await fetch('/api/requests/trending');
                        const data = await res.json();
                        if(data.status === 'success') {
                            this.trendingMovies = data.data.movies;
                            this.trendingTv = data.data.tv;
                        }
                    } catch (e) {}
                },

                async searchMedia() {
                    if (!this.searchQuery.trim()) return;
                    this.isSearching = true;
                    this.currentTab = 'explore';
                    try {
                        const res = await fetch(`/api/requests/search?query=${encodeURIComponent(this.searchQuery)}`);
                        const data = await res.json();
                        if (data.status === 'success') {
                            this.searchResults = data.data;
                            if (data.data.length === 0) this.showToast('未找到相关结果', 'error');
                        } else { this.showToast(data.message, 'error'); }
                    } catch (e) { this.showToast('网络错误', 'error'); } 
                    finally { this.isSearching = false; }
                },

                async loadQueue() {
                    try {
                        const res = await fetch('/api/requests/my');
                        const data = await res.json();
                        if (data.status === 'success') this.myQueue = data.data;
                    } catch (e) {}
                },

                async openModal(item) {
                    this.activeItem = item;
                    this.isModalOpen = true;
                    this.tvSeasons = [];
                    this.selectedSeason = null;
                    document.body.style.overflow = 'hidden';

                    if (item.media_type === 'tv') {
                        this.isLoadingSeasons = true;
                        try {
                            const res = await fetch(`/api/requests/tv/${item.tmdb_id}`);
                            const data = await res.json();
                            if (data.status === 'success') {
                                this.tvSeasons = data.seasons;
                                const firstAvailable = this.tvSeasons.find(s => !s.exists_locally);
                                if (firstAvailable) this.selectedSeason = firstAvailable.season_number;
                            }
                        } catch (e) {}
                        this.isLoadingSeasons = false;
                    }
                },

                closeModal() {
                    this.isModalOpen = false;
                    setTimeout(() => { this.activeItem = null; }, 300);
                    document.body.style.overflow = '';
                },

                async submitRequest() {
                    if (this.activeItem.media_type === 'movie' && this.activeItem.local_status === 2) return;
                    this.isSubmitting = true;
                    const payload = {
                        tmdb_id: this.activeItem.tmdb_id, media_type: this.activeItem.media_type,
                        title: this.activeItem.title, year: this.activeItem.year,
                        poster_path: this.activeItem.poster_path, overview: this.activeItem.overview,
                        season: this.selectedSeason || 0
                    };
                    try {
                        const res = await fetch('/api/requests/submit', {
                            method: 'POST', headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(payload)
                        });
                        const data = await res.json();
                        if (data.status === 'success') {
                            this.showToast('✅ ' + data.message);
                            this.closeModal();
                            this.loadQueue(); 
                            setTimeout(() => this.switchTab('queue'), 500); 
                        } else { this.showToast('❌ ' + data.message, 'error'); }
                    } catch (e) { this.showToast('提交失败，请重试', 'error'); } 
                    finally { this.isSubmitting = false; }
                }
            }));
        });
    </script>
</body>
</html>
