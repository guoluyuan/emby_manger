<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>探索宇宙 - EmbyPulse</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', system-ui, sans-serif; background-color: #0f172a; color: #f8fafc; }
        .glass-panel { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .poster-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .poster-card:hover { transform: scale(1.05); box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5), 0 8px 10px -6px rgba(0, 0, 0, 0.5); z-index: 10; }
        .bg-gradient-radial { background: radial-gradient(circle at center, var(--tw-gradient-stops)); }
        
        /* Modal 动画 */
        [x-cloak] { display: none !important; }
    </style>
</head>
<body class="antialiased min-h-screen relative pb-20" x-data="requestApp()">
    
    <div class="fixed inset-0 z-[-1] overflow-hidden pointer-events-none">
        <div class="absolute top-[-20%] left-[-10%] w-[70%] h-[70%] rounded-full bg-gradient-radial from-indigo-900/40 to-transparent blur-3xl opacity-50"></div>
        <div class="absolute bottom-[-20%] right-[-10%] w-[60%] h-[60%] rounded-full bg-gradient-radial from-purple-900/30 to-transparent blur-3xl opacity-50"></div>
    </div>

    <nav class="fixed top-0 w-full z-40 glass-panel border-b-0 border-white/5">
        <div class="max-w-6xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <span class="text-2xl">🍿</span>
                <h1 class="text-lg font-bold tracking-wide bg-clip-text text-transparent bg-gradient-to-r from-indigo-400 to-purple-400">EmbyPulse</h1>
            </div>
            <button @click="logout()" class="text-sm font-medium text-slate-400 hover:text-white transition-colors px-3 py-1.5 rounded-full hover:bg-white/10">
                退出登录
            </button>
        </div>
    </nav>

    <main class="pt-24 max-w-6xl mx-auto px-4 pb-12">
        <div class="text-center py-10 space-y-4">
            <h2 class="text-4xl md:text-5xl font-extrabold tracking-tight">想看什么？交给我。</h2>
            <p class="text-slate-400 text-lg">探索全球海量影视，一键订阅入库</p>
        </div>

        <div class="max-w-2xl mx-auto relative group">
            <div class="absolute -inset-1 bg-gradient-to-r from-indigo-500 to-purple-500 rounded-full blur opacity-25 group-hover:opacity-50 transition duration-1000"></div>
            <form @submit.prevent="searchMedia()" class="relative flex items-center glass-panel rounded-full p-1.5">
                <div class="pl-4 text-slate-400"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg></div>
                <input type="text" x-model="searchQuery" placeholder="搜索电影、电视剧、动漫..." class="w-full bg-transparent border-none focus:ring-0 text-white placeholder-slate-500 px-4 py-3 outline-none text-lg">
                <button type="submit" class="bg-indigo-600 hover:bg-indigo-500 text-white px-6 py-2.5 rounded-full font-medium transition-all shadow-lg shadow-indigo-500/30 active:scale-95 flex items-center gap-2">
                    <span x-show="!isSearching">搜索</span>
                    <svg x-show="isSearching" class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                </button>
            </form>
        </div>

        <div class="flex justify-center mt-12 mb-8">
            <div class="glass-panel p-1 rounded-full inline-flex relative w-64 shadow-inner">
                <div class="absolute inset-y-1 left-1 w-[calc(50%-4px)] bg-slate-700/80 rounded-full transition-transform duration-300 ease-out shadow-sm border border-white/10" 
                     :class="currentTab === 'queue' ? 'translate-x-full' : 'translate-x-0'"></div>
                <button @click="switchTab('explore')" class="flex-1 relative z-10 py-2 text-sm font-medium transition-colors" :class="currentTab === 'explore' ? 'text-white' : 'text-slate-400 hover:text-slate-200'">🧭 探索大厅</button>
                <button @click="switchTab('queue')" class="flex-1 relative z-10 py-2 text-sm font-medium transition-colors" :class="currentTab === 'queue' ? 'text-white' : 'text-slate-400 hover:text-slate-200'">📝 我的队列</button>
            </div>
        </div>

        <div class="min-h-[400px]">
            
            <div x-show="currentTab === 'explore'" x-transition.opacity.duration.300ms>
                
                <div x-show="searchResults.length > 0">
                    <h3 class="text-xl font-bold mb-4 flex items-center gap-2"><span class="text-indigo-400">🔍</span> 搜索结果</h3>
                    <div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-4 md:gap-6">
                        <template x-for="item in searchResults" :key="item.tmdb_id">
                            <div @click="openModal(item)" class="poster-card relative rounded-xl overflow-hidden cursor-pointer bg-slate-800 aspect-[2/3] ring-1 ring-white/10 group">
                                <img :src="item.poster_path || 'https://via.placeholder.com/500x750?text=No+Poster'" class="w-full h-full object-cover" loading="lazy">
                                <div class="absolute inset-0 bg-gradient-to-t from-black/90 via-black/20 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-300 flex flex-col justify-end p-4">
                                    <div class="text-xs font-bold px-2 py-1 bg-indigo-600/90 rounded text-white self-start mb-2 backdrop-blur-sm" x-text="item.media_type === 'movie' ? '电影' : '剧集'"></div>
                                    <h4 class="font-bold text-white line-clamp-2" x-text="item.title"></h4>
                                    <div class="flex items-center justify-between mt-1 text-sm text-slate-300">
                                        <span x-text="item.year"></span>
                                        <span class="flex items-center gap-1 text-yellow-400">★ <span x-text="item.vote_average"></span></span>
                                    </div>
                                </div>
                                <div x-show="item.local_status === 2" class="absolute top-2 right-2 bg-green-500/90 backdrop-blur-md text-white text-xs px-2 py-1 rounded-full font-bold shadow-lg">已入库</div>
                                <div x-show="item.local_status === 0 || item.local_status === 1" class="absolute top-2 right-2 bg-blue-500/90 backdrop-blur-md text-white text-xs px-2 py-1 rounded-full font-bold shadow-lg">排队中</div>
                            </div>
                        </template>
                    </div>
                </div>

                <div x-show="searchResults.length === 0 && trendingItems.length > 0" class="mt-8">
                    <h3 class="text-xl font-bold mb-4 flex items-center gap-2"><span class="text-purple-400">🔥</span> 本周全球热门</h3>
                    <div class="flex overflow-x-auto hide-scrollbar gap-4 md:gap-6 pb-6 pt-2 -mx-4 px-4 snap-x">
                        <template x-for="item in trendingItems" :key="item.tmdb_id">
                            <div @click="openModal(item)" class="poster-card flex-none w-36 md:w-48 relative rounded-xl overflow-hidden cursor-pointer bg-slate-800 aspect-[2/3] ring-1 ring-white/10 snap-start group">
                                <img :src="item.poster_path" class="w-full h-full object-cover" loading="lazy">
                                <div class="absolute inset-0 bg-gradient-to-t from-black/90 via-transparent to-transparent opacity-100 md:opacity-0 group-hover:opacity-100 transition-opacity duration-300 flex flex-col justify-end p-3">
                                    <h4 class="font-bold text-white text-sm line-clamp-2" x-text="item.title"></h4>
                                    <span class="text-xs text-slate-300 mt-1 flex items-center gap-1 text-yellow-400">★ <span x-text="item.vote_average"></span></span>
                                </div>
                            </div>
                        </template>
                    </div>
                </div>

            </div>

            <div x-show="currentTab === 'queue'" x-transition.opacity.duration.300ms x-cloak>
                <div x-show="myQueue.length === 0" class="text-center py-20 text-slate-500">
                    <svg class="w-16 h-16 mx-auto mb-4 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 002-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
                    <p>你的队列空空如也，快去大厅逛逛吧</p>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <template x-for="item in myQueue" :key="item.tmdb_id">
                        <div class="glass-panel p-4 rounded-2xl flex gap-4 items-center">
                            <img :src="item.poster_path" class="w-20 rounded-lg shadow-md aspect-[2/3] object-cover">
                            <div class="flex-1">
                                <h4 class="font-bold text-lg text-white line-clamp-1" x-text="item.title"></h4>
                                <div class="text-sm text-slate-400 mt-1 mb-3" x-text="item.media_type === 'tv' ? `${item.year} · 第 ${item.season} 季` : item.year"></div>
                                
                                <span x-show="item.status === 0" class="px-3 py-1 bg-slate-700/50 text-slate-300 rounded-full text-xs font-medium border border-slate-600">审核中</span>
                                <span x-show="item.status === 1" class="px-3 py-1 bg-blue-500/20 text-blue-400 rounded-full text-xs font-medium border border-blue-500/30 flex inline-flex items-center gap-1"><span class="animate-pulse w-2 h-2 bg-blue-400 rounded-full"></span> 下载中</span>
                                <span x-show="item.status === 2" class="px-3 py-1 bg-green-500/20 text-green-400 rounded-full text-xs font-medium border border-green-500/30">✅ 已入库</span>
                                <span x-show="item.status === 3" class="px-3 py-1 bg-red-500/20 text-red-400 rounded-full text-xs font-medium border border-red-500/30">❌ 已拒绝</span>
                            </div>
                        </div>
                    </template>
                </div>
            </div>

        </div>
    </main>

    <div x-show="isModalOpen" class="fixed inset-0 z-50 flex items-end md:items-center justify-center p-0 md:p-4" x-cloak>
        <div x-show="isModalOpen" x-transition.opacity @click="closeModal()" class="absolute inset-0 bg-black/70 backdrop-blur-sm"></div>
        
        <div x-show="isModalOpen" x-transition:enter="transition ease-out duration-300" x-transition:enter-start="opacity-0 translate-y-full md:translate-y-10 scale-95" x-transition:enter-end="opacity-100 translate-y-0 scale-100"
             class="relative w-full md:w-[600px] max-h-[90vh] bg-slate-900 border border-white/10 rounded-t-3xl md:rounded-3xl overflow-hidden shadow-2xl flex flex-col">
            
            <div class="relative h-48 md:h-64 shrink-0 bg-slate-800">
                <img :src="activeItem?.backdrop_path || activeItem?.poster_path" class="w-full h-full object-cover opacity-60">
                <div class="absolute inset-0 bg-gradient-to-t from-slate-900 via-slate-900/40 to-transparent"></div>
                <button @click="closeModal()" class="absolute top-4 right-4 bg-black/50 hover:bg-black/80 text-white rounded-full p-2 backdrop-blur-md transition">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>

            <div class="relative px-6 pb-6 pt-0 flex-1 overflow-y-auto hide-scrollbar -mt-16">
                <div class="flex gap-4 items-end mb-4">
                    <img :src="activeItem?.poster_path" class="w-24 md:w-32 rounded-xl shadow-xl ring-2 ring-white/10 relative z-10 aspect-[2/3] object-cover bg-slate-800">
                    <div class="pb-2">
                        <h2 class="text-2xl md:text-3xl font-extrabold text-white leading-tight" x-text="activeItem?.title"></h2>
                        <div class="flex items-center gap-3 mt-2 text-sm text-slate-300">
                            <span class="px-2 py-0.5 bg-white/10 rounded font-medium" x-text="activeItem?.media_type === 'movie' ? '电影' : '剧集'"></span>
                            <span x-text="activeItem?.year"></span>
                            <span class="flex items-center gap-1 text-yellow-400 font-bold">★ <span x-text="activeItem?.vote_average"></span></span>
                        </div>
                    </div>
                </div>

                <p class="text-slate-300 text-sm leading-relaxed mb-6" x-text="activeItem?.overview || '暂无剧情简介...'"></p>

                <div x-show="activeItem?.media_type === 'tv'" class="mb-6 bg-white/5 rounded-2xl p-4 border border-white/5">
                    <h4 class="text-sm font-bold text-white mb-3 flex justify-between items-center">
                        选择订阅季数
                        <span x-show="isLoadingSeasons" class="text-xs text-indigo-400 animate-pulse">正在扫描媒体库...</span>
                    </h4>
                    <div class="flex flex-wrap gap-2 max-h-32 overflow-y-auto hide-scrollbar">
                        <template x-for="s in tvSeasons" :key="s.season_number">
                            <button @click="if(!s.exists_locally) selectedSeason = s.season_number"
                                    class="px-4 py-2 rounded-xl text-sm font-medium transition-all border"
                                    :class="s.exists_locally ? 'bg-green-500/10 border-green-500/30 text-green-400 cursor-not-allowed' : (selectedSeason === s.season_number ? 'bg-indigo-600 border-indigo-500 text-white shadow-lg shadow-indigo-500/40' : 'bg-slate-800 border-slate-600 text-slate-300 hover:bg-slate-700')">
                                <span x-text="`第 ${s.season_number} 季`"></span>
                                <span x-show="s.exists_locally" class="ml-1 text-xs">✅</span>
                            </button>
                        </template>
                        <div x-show="!isLoadingSeasons && tvSeasons.length === 0" class="text-xs text-slate-500">该剧集暂无分季数据</div>
                    </div>
                </div>

                <button @click="submitRequest()" :disabled="isSubmitting || (activeItem?.media_type === 'tv' && !selectedSeason)"
                        class="w-full py-4 rounded-xl font-bold text-lg flex justify-center items-center gap-2 transition-all disabled:opacity-50 disabled:cursor-not-allowed"
                        :class="(activeItem?.local_status === 2 && activeItem?.media_type !== 'tv') ? 'bg-green-600 text-white' : 'bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-500 hover:to-purple-500 shadow-lg shadow-indigo-600/30 text-white'">
                    <span x-show="isSubmitting" class="animate-spin w-5 h-5 border-2 border-white/30 border-t-white rounded-full"></span>
                    <span x-show="!isSubmitting && activeItem?.local_status === 2 && activeItem?.media_type !== 'tv'">✅ 已在库中</span>
                    <span x-show="!isSubmitting && !(activeItem?.local_status === 2 && activeItem?.media_type !== 'tv')">🚀 立即发送求片心愿</span>
                </button>
            </div>
        </div>
    </div>

    <div x-show="toast.show" x-transition x-cloak class="fixed top-20 left-1/2 -translate-x-1/2 z-50 px-6 py-3 rounded-full shadow-2xl border backdrop-blur-md flex items-center gap-2 font-medium"
         :class="toast.type === 'success' ? 'bg-green-500/20 border-green-500/30 text-green-400' : 'bg-red-500/20 border-red-500/30 text-red-400'">
        <span x-text="toast.message"></span>
    </div>

    <script>
        document.addEventListener('alpine:init', () => {
            Alpine.data('requestApp', () => ({
                searchQuery: '',
                isSearching: false,
                currentTab: 'explore', // explore | queue
                searchResults: [],
                trendingItems: [],
                myQueue: [],
                
                // Modal state
                isModalOpen: false,
                activeItem: null,
                tvSeasons: [],
                isLoadingSeasons: false,
                selectedSeason: null,
                isSubmitting: false,

                // Toast state
                toast: { show: false, message: '', type: 'success' },

                init() {
                    this.loadTrending();
                    // Setup polling for queue
                    setInterval(() => { if (this.currentTab === 'queue') this.loadQueue(); }, 10000);
                },

                showToast(msg, type = 'success') {
                    this.toast = { show: true, message: msg, type };
                    setTimeout(() => this.toast.show = false, 3000);
                },

                switchTab(tab) {
                    this.currentTab = tab;
                    if (tab === 'queue') this.loadQueue();
                },

                async loadTrending() {
                    try {
                        const res = await fetch('/api/requests/trending');
                        const data = await res.json();
                        if(data.status === 'success') this.trendingItems = data.data;
                    } catch (e) {}
                },

                async searchMedia() {
                    if (!this.searchQuery.trim()) return;
                    this.isSearching = true;
                    this.currentTab = 'explore';
                    try {
                        const res = await fetch(`/api/requests/search?query=${encodeURIComponent(this.searchQuery)}`);
                        const data = await res.json();
                        if (data.status === 'success') {
                            this.searchResults = data.data;
                            if (data.data.length === 0) this.showToast('未找到相关结果', 'error');
                        } else {
                            this.showToast(data.message, 'error');
                        }
                    } catch (e) {
                        this.showToast('网络错误', 'error');
                    } finally {
                        this.isSearching = false;
                    }
                },

                async loadQueue() {
                    try {
                        const res = await fetch('/api/requests/my');
                        const data = await res.json();
                        if (data.status === 'success') this.myQueue = data.data;
                    } catch (e) {}
                },

                async openModal(item) {
                    this.activeItem = item;
                    this.isModalOpen = true;
                    this.tvSeasons = [];
                    this.selectedSeason = null;
                    document.body.style.overflow = 'hidden';

                    if (item.media_type === 'tv') {
                        this.isLoadingSeasons = true;
                        try {
                            const res = await fetch(`/api/requests/tv/${item.tmdb_id}`);
                            const data = await res.json();
                            if (data.status === 'success') {
                                this.tvSeasons = data.seasons;
                                // Auto select first available season
                                const firstAvailable = this.tvSeasons.find(s => !s.exists_locally);
                                if (firstAvailable) this.selectedSeason = firstAvailable.season_number;
                            }
                        } catch (e) {}
                        this.isLoadingSeasons = false;
                    }
                },

                closeModal() {
                    this.isModalOpen = false;
                    setTimeout(() => { this.activeItem = null; }, 300);
                    document.body.style.overflow = '';
                },

                async submitRequest() {
                    if (this.activeItem.media_type === 'movie' && this.activeItem.local_status === 2) return;
                    
                    this.isSubmitting = true;
                    const payload = {
                        tmdb_id: this.activeItem.tmdb_id,
                        media_type: this.activeItem.media_type,
                        title: this.activeItem.title,
                        year: this.activeItem.year,
                        poster_path: this.activeItem.poster_path,
                        overview: this.activeItem.overview,
                        season: this.selectedSeason || 0
                    };

                    try {
                        const res = await fetch('/api/requests/submit', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(payload)
                        });
                        const data = await res.json();
                        if (data.status === 'success') {
                            this.showToast('✅ ' + data.message);
                            this.closeModal();
                            this.loadQueue(); // pre-load queue
                            setTimeout(() => this.switchTab('queue'), 500); // jump to queue
                        } else {
                            this.showToast('❌ ' + data.message, 'error');
                        }
                    } catch (e) {
                        this.showToast('提交失败，请重试', 'error');
                    } finally {
                        this.isSubmitting = false;
                    }
                },

                async logout() {
                    try {
                        await fetch('/api/requests/logout', { method: 'POST' });
                        window.location.href = '/'; // 强制跳转回登录页
                    } catch (e) {
                        window.location.reload();
                    }
                }
            }));
        });
    </script>
</body>
</html>
