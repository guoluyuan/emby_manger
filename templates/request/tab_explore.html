<div class="w-full pb-6">
    
    <div class="grid grid-cols-2 md:grid-cols-4 gap-3 sm:gap-4 mb-10">
        <div class="relative p-5 rounded-3xl overflow-hidden shadow-lg bg-gradient-to-br from-blue-500 to-indigo-600 text-white group">
            <i class="fa-solid fa-film absolute -right-4 -bottom-4 text-7xl opacity-20 group-hover:scale-110 transition-transform duration-500"></i>
            <div class="relative z-10">
                <div class="text-3xl sm:text-4xl font-black font-mono drop-shadow-md" x-text="serverDashboard?.library?.movie || '-'"></div>
                <div class="text-[11px] sm:text-xs font-bold tracking-widest mt-1 opacity-90 uppercase">收录电影</div>
            </div>
        </div>

        <div class="relative p-5 rounded-3xl overflow-hidden shadow-lg bg-gradient-to-br from-orange-400 to-rose-500 text-white group">
            <i class="fa-solid fa-tv absolute -right-4 -bottom-4 text-7xl opacity-20 group-hover:scale-110 transition-transform duration-500"></i>
            <div class="relative z-10">
                <div class="text-3xl sm:text-4xl font-black font-mono drop-shadow-md" x-text="serverDashboard?.library?.series || '-'"></div>
                <div class="text-[11px] sm:text-xs font-bold tracking-widest mt-1 opacity-90 uppercase">收录剧集</div>
            </div>
        </div>

        <div class="relative p-5 rounded-3xl overflow-hidden shadow-lg bg-gradient-to-br from-emerald-400 to-teal-500 text-white group">
            <i class="fa-solid fa-layer-group absolute -right-4 -bottom-4 text-7xl opacity-20 group-hover:scale-110 transition-transform duration-500"></i>
            <div class="relative z-10">
                <div class="text-3xl sm:text-4xl font-black font-mono drop-shadow-md" x-text="serverDashboard?.library?.episode || '-'"></div>
                <div class="text-[11px] sm:text-xs font-bold tracking-widest mt-1 opacity-90 uppercase">海量单集</div>
            </div>
        </div>

        <div class="relative p-5 rounded-3xl overflow-hidden shadow-lg bg-gradient-to-br from-purple-500 to-fuchsia-600 text-white group">
            <i class="fa-solid fa-play absolute -right-4 -bottom-4 text-7xl opacity-20 group-hover:scale-110 transition-transform duration-500"></i>
            <div class="relative z-10">
                <div class="text-3xl sm:text-4xl font-black font-mono drop-shadow-md" x-text="serverDashboard?.total_plays || '-'"></div>
                <div class="text-[11px] sm:text-xs font-bold tracking-widest mt-1 opacity-90 uppercase">历史总播放</div>
            </div>
        </div>
    </div>

    <div x-show="serverGenres.length > 0" class="mb-10 glass-panel p-5 sm:p-6 rounded-3xl shadow-sm border border-slate-200/50 dark:border-white/5">
        <h3 class="text-base sm:text-lg font-bold mb-4 flex items-center gap-2 text-slate-800 dark:text-white">
            <i class="fa-solid fa-chart-pie text-brand-500"></i> 媒体库流派构成分析
        </h3>
        <div class="space-y-4">
            <div class="flex h-3 sm:h-4 rounded-full overflow-hidden shadow-inner bg-slate-100 dark:bg-white/5">
                <template x-for="(g, index) in serverGenres" :key="g.name">
                    <div class="h-full transition-all duration-500 hover:opacity-80 cursor-pointer" 
                         :class="['bg-blue-500', 'bg-indigo-500', 'bg-purple-500', 'bg-rose-500', 'bg-orange-500', 'bg-emerald-500'][index % 6]"
                         :style="`width: ${g.pct}%`" :title="`${g.name}: ${g.pct}%`"></div>
                </template>
            </div>
            <div class="flex flex-wrap gap-2.5">
                <template x-for="(g, index) in serverGenres" :key="g.name">
                    <div class="flex items-center gap-1.5 text-[10px] sm:text-xs font-bold text-slate-600 dark:text-zinc-300 bg-white dark:bg-white/5 px-2.5 py-1 rounded-lg border border-slate-200 dark:border-white/10 shadow-sm">
                        <span class="w-2 h-2 rounded-full" :class="['bg-blue-500', 'bg-indigo-500', 'bg-purple-500', 'bg-rose-500', 'bg-orange-500', 'bg-emerald-500'][index % 6]"></span>
                        <span x-text="g.name"></span>
                        <span class="text-slate-400 font-mono ml-0.5" x-text="g.pct + '%'"></span>
                    </div>
                </template>
            </div>
        </div>
    </div>

    <div x-show="serverLatest.length > 0" class="mb-10">
        <div class="flex items-center justify-between mb-4 px-1">
            <h3 class="text-lg sm:text-xl font-bold flex items-center gap-2 text-slate-800 dark:text-white">
                <i class="fa-solid fa-bolt text-blue-500"></i> 最新收录资源
            </h3>
            <button @click="loadServerData(); showToast('已同步最新数据')" class="text-xs text-slate-400 hover:text-brand-500 transition-colors">
                <i class="fa-solid fa-rotate-right"></i> 刷新
            </button>
        </div>
        <div x-data="dragScroll" @mousedown="start" @mouseleave="end" @mouseup="end" @mousemove="move" 
             class="flex overflow-x-auto hide-scrollbar gap-4 pb-6 pt-2 -mx-4 px-4 cursor-grab active:cursor-grabbing select-none">
            <template x-for="item in serverLatest" :key="item.Id">
                <div class="poster-card flex-none w-32 md:w-48 relative rounded-2xl overflow-hidden bg-slate-200 dark:bg-[#111] aspect-[2/3] ring-1 ring-black/5 dark:ring-white/5 group shadow-md" 
                     @click="if(!isDragging) openShowcaseModal(item.Id, item)">
                    <img :src="`/api/proxy/smart_image?item_id=${item.Id}&type=Primary`" 
                         @error="window.fallbackPoster($el, item.Name)" 
                         class="w-full h-full object-cover pointer-events-none" loading="lazy">
                    <div class="absolute inset-0 bg-gradient-to-t from-black/90 via-black/20 to-transparent opacity-100 md:opacity-0 group-hover:opacity-100 transition-opacity duration-300 flex flex-col justify-end p-3 pointer-events-none">
                        <div class="text-[10px] font-bold px-1.5 py-0.5 bg-blue-500 rounded text-white self-start mb-1" x-text="item.Type === 'Movie' ? '电影' : '剧集'"></div>
                        <h4 class="font-bold text-white text-sm line-clamp-2 leading-tight mb-1" x-text="item.Name"></h4>
                        <span class="text-xs text-zinc-300 flex items-center gap-1 text-yellow-400 font-bold" x-show="item.Rating">★ <span x-text="item.Rating"></span></span>
                    </div>
                </div>
            </template>
        </div>
    </div>

    <div x-show="serverTopRated.length > 0" class="mb-10">
        <h3 class="text-lg sm:text-xl font-bold mb-4 flex items-center gap-2 text-slate-800 dark:text-white px-1">
            <i class="fa-solid fa-crown text-yellow-500"></i> 镇站之宝 (神作典藏)
        </h3>
        <div x-data="dragScroll" @mousedown="start" @mouseleave="end" @mouseup="end" @mousemove="move" 
             class="flex overflow-x-auto hide-scrollbar gap-4 pb-6 pt-2 -mx-4 px-4 cursor-grab active:cursor-grabbing select-none">
            <template x-for="(item, index) in serverTopRated" :key="item.Id">
                <div class="poster-card flex-none w-32 md:w-48 relative rounded-2xl overflow-hidden bg-slate-200 dark:bg-[#111] aspect-[2/3] ring-1 ring-black/5 dark:ring-white/5 group shadow-md" 
                     @click="if(!isDragging) openShowcaseModal(item.Id, item)">
                    <img :src="`/api/proxy/smart_image?item_id=${item.Id}&type=Primary`" 
                         @error="window.fallbackPoster($el, item.Name)" 
                         class="w-full h-full object-cover pointer-events-none" loading="lazy">
                    <div class="absolute top-0 right-0 bg-yellow-400 text-yellow-900 text-[11px] font-black px-2 py-1 rounded-bl-xl backdrop-blur-md z-10 shadow-sm flex items-center gap-1">
                        <i class="fa-solid fa-star"></i> <span x-text="item.CommunityRating.toFixed(1)"></span>
                    </div>
                    <div class="absolute inset-0 bg-gradient-to-t from-black/90 via-transparent to-transparent opacity-100 md:opacity-0 group-hover:opacity-100 transition-opacity duration-300 flex flex-col justify-end p-3 pointer-events-none">
                        <div class="text-[10px] font-bold px-1.5 py-0.5 bg-indigo-500 rounded text-white self-start mb-1" x-text="item.Type === 'Movie' ? '电影' : '剧集'"></div>
                        <h4 class="font-bold text-white text-sm line-clamp-2 leading-tight" x-text="item.Name"></h4>
                    </div>
                </div>
            </template>
        </div>
    </div>

    <div x-show="serverTopMovies.length > 0" class="mb-10">
        <h3 class="text-lg sm:text-xl font-bold mb-4 flex items-center gap-2 text-slate-800 dark:text-white px-1">
            <i class="fa-solid fa-fire text-rose-500"></i> 电影热播榜 Top 10
        </h3>
        <div x-data="dragScroll" @mousedown="start" @mouseleave="end" @mouseup="end" @mousemove="move" 
             class="flex overflow-x-auto hide-scrollbar gap-4 pb-6 pt-2 -mx-4 px-4 cursor-grab active:cursor-grabbing select-none">
            <template x-for="(item, index) in serverTopMovies" :key="item.ItemId">
                <div class="poster-card flex-none w-32 md:w-48 relative rounded-2xl overflow-hidden bg-slate-200 dark:bg-[#111] aspect-[2/3] ring-1 ring-black/5 dark:ring-white/5 group shadow-md" 
                     @click="if(!isDragging) openShowcaseModal(item.ItemId, item)">
                    <img :src="`/api/proxy/smart_image?item_id=${item.ItemId}&type=Primary`" 
                         @error="window.fallbackPoster($el, item.ItemName)" 
                         class="w-full h-full object-cover pointer-events-none" loading="lazy">
                    <div class="absolute top-0 left-0 bg-black/60 text-white text-xs font-black px-2 py-1 rounded-br-lg backdrop-blur-md z-10" 
                         :class="index < 3 ? 'text-rose-400' : ''">
                        TOP <span x-text="index + 1"></span>
                    </div>
                    <div class="absolute inset-0 bg-gradient-to-t from-black/90 via-transparent to-transparent opacity-100 md:opacity-0 group-hover:opacity-100 transition-opacity duration-300 flex flex-col justify-end p-3 pointer-events-none">
                        <h4 class="font-bold text-white text-sm line-clamp-2 leading-tight" x-text="item.ItemName"></h4>
                        <div class="text-[10px] text-zinc-300 mt-1 font-mono">播放: <span x-text="item.PlayCount"></span> 次</div>
                    </div>
                </div>
            </template>
        </div>
    </div>

    <div x-show="serverTopSeries.length > 0" class="mb-6">
        <h3 class="text-lg sm:text-xl font-bold mb-4 flex items-center gap-2 text-slate-800 dark:text-white px-1">
            <i class="fa-solid fa-fire text-orange-500"></i> 剧集热播榜 Top 10
        </h3>
        <div x-data="dragScroll" @mousedown="start" @mouseleave="end" @mouseup="end" @mousemove="move" 
             class="flex overflow-x-auto hide-scrollbar gap-4 pb-6 pt-2 -mx-4 px-4 cursor-grab active:cursor-grabbing select-none">
            <template x-for="(item, index) in serverTopSeries" :key="item.ItemId + '-' + item.ItemName">
                <div class="poster-card flex-none w-32 md:w-48 relative rounded-2xl overflow-hidden bg-slate-200 dark:bg-[#111] aspect-[2/3] ring-1 ring-black/5 dark:ring-white/5 group shadow-md" 
                     @click="if(!isDragging) openShowcaseModal(item.ItemId, item)">
                    <img :src="`/api/proxy/smart_image?item_id=${item.ItemId}&type=Primary`" 
                         @error="window.fallbackPoster($el, item.ItemName)" 
                         class="w-full h-full object-cover pointer-events-none" loading="lazy">
                    <div class="absolute top-0 left-0 bg-black/60 text-white text-xs font-black px-2 py-1 rounded-br-lg backdrop-blur-md z-10" 
                         :class="index < 3 ? 'text-orange-400' : ''">
                        TOP <span x-text="index + 1"></span>
                    </div>
                    <div class="absolute inset-0 bg-gradient-to-t from-black/90 via-transparent to-transparent opacity-100 md:opacity-0 group-hover:opacity-100 transition-opacity duration-300 flex flex-col justify-end p-3 pointer-events-none">
                        <h4 class="font-bold text-white text-sm line-clamp-2 leading-tight" x-text="item.ItemName"></h4>
                        <div class="text-[10px] text-zinc-300 mt-1 font-mono">播放: <span x-text="item.PlayCount"></span> 次</div>
                    </div>
                </div>
            </template>
        </div>
    </div>
</div>
