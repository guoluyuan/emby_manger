<div x-show="!isLoggedIn && isLoaded" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/10 dark:bg-black/40" x-cloak>
    <div class="w-full max-w-md glass-panel login-glass rounded-3xl p-8 relative overflow-hidden">
        <div class="absolute inset-0 bg-gradient-to-br from-brand-500/5 to-blue-500/5 z-0"></div>
        <div class="text-center mb-8 relative z-10">
            <img src="/static/img/logo-app-2.avif?v={{ request_asset_ver }}" onerror="if(!this.dataset.fallback){this.dataset.fallback='webp';this.src='/static/img/logo-app-2.webp?v={{ request_asset_ver }}';} else if(this.dataset.fallback==='webp'){this.dataset.fallback='png';this.src='/static/img/logo-app-2.png?v={{ request_asset_ver }}';} else {this.onerror=null;}" class="w-16 h-16 mx-auto mb-4 drop-shadow-lg rounded-2xl object-contain">
            <h2 class="text-2xl font-extrabold tracking-tight text-slate-900 dark:text-white">用户社区</h2>
            <p class="text-slate-500 dark:text-zinc-400 mt-2 text-sm">请输入 Emby 账号密码登录</p>
        </div>
        <form @submit.prevent="login()" class="space-y-5 relative z-10">
            <div class="space-y-1"><input type="text" x-model="loginForm.username" placeholder="Emby 账号" required class="w-full px-4 py-3.5 rounded-2xl bg-white/60 dark:bg-white/5 border border-slate-200 dark:border-white/5 focus:ring-2 focus:ring-brand-500 outline-none transition-all placeholder-slate-400 dark:placeholder-zinc-500 text-slate-900 dark:text-white"></div>
            <div class="space-y-1"><input type="password" x-model="loginForm.password" placeholder="Emby 密码" required class="w-full px-4 py-3.5 rounded-2xl bg-white/60 dark:bg-white/5 border border-slate-200 dark:border-white/5 focus:ring-2 focus:ring-brand-500 outline-none transition-all placeholder-slate-400 dark:placeholder-zinc-500 text-slate-900 dark:text-white"></div>
            <div class="space-y-1">
                <div class="text-[11px] text-slate-500 dark:text-zinc-400">验证码</div>
                <div class="flex items-center gap-2">
                    <img :src="captchaImage" alt="captcha" class="h-14 rounded-lg border border-slate-200 dark:border-white/10 bg-white/70 dark:bg-white/5">
                    <button type="button" @click="refreshCaptcha()" class="px-2.5 py-1 rounded-lg text-[11px] font-bold bg-white/10 hover:bg-white/20 border border-white/10 transition text-brand-500 hover:text-brand-600">刷新</button>
                </div>
                <input type="text" x-model="loginForm.captcha" placeholder="请输入验证码" required class="w-full px-4 py-3.5 rounded-2xl bg-white/60 dark:bg-white/5 border border-slate-200 dark:border-white/5 focus:ring-2 focus:ring-brand-500 outline-none transition-all placeholder-slate-400 dark:placeholder-zinc-500 text-slate-900 dark:text-white">
            </div>
            <button type="submit" :disabled="isLoggingIn" class="w-full py-4 rounded-2xl font-bold text-white bg-gradient-to-r from-brand-500 to-blue-500 hover:from-brand-600 hover:to-blue-600 shadow-xl shadow-brand-500/20 transition-all flex items-center justify-center gap-2 group">
                <span x-show="isLoggingIn" class="animate-spin w-5 h-5 border-2 border-white/30 border-t-white rounded-full"></span>
                <template x-if="!isLoggingIn"><div class="flex items-center gap-2"><span>进入社区</span><i class="fa-solid fa-arrow-right group-hover:translate-x-1 transition-transform"></i></div></template>
            </button>
        </form>
        <div class="mt-8 text-center relative z-10"><p class="text-[10px] text-slate-400 dark:text-zinc-500 font-medium tracking-widest uppercase">Powered by EmbyPulse Engine</p></div>
    </div>
</div>
