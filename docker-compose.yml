version: '3.8'

services:
  emby-pulse:
    image: mp740429299/emby_manger:latest
    container_name: emby-pulse
    restart: unless-stopped
    
    # Host 模式：直接使用宿主机网络
    network_mode: host
    
    volumes:
      # 你的 Emby 数据真实路径
      - /volume1/docker/emby/data:/emby-data:ro
    
    environment:
      - TZ=Asia/Shanghai
      - DB_PATH=/emby-data/playback_reporting.db
      # 🔥 新增：Emby 的局域网访问地址
      # 因为是 Host 模式，127.0.0.1 指的就是 NAS 自己
      - EMBY_HOST=http://127.0.0.1:8096
