# 旧版 docker-compose(v1) 项目名默认取当前目录名，建议目录名为 emby-manger（或用 -p emby-manger 指定）
version: '3.8'

services:
  emby-manger:
    image: mp740429299/emby_manger:latest
    container_name: emby-manger
    restart: unless-stopped
    
    # Host 模式：直接使用宿主机网络
    network_mode: host
    
    volumes:
      # 你的 Emby 数据真实路径
      - /volume1/docker/emby/data:/emby-data:ro
      # 配置持久化（避免更新后重新初始化）
      - /em/docker/emby管理/config:/app/config
      # 允许容器内执行更新
      - /var/run/docker.sock:/var/run/docker.sock
      # 挂载 compose 文件目录，供容器内更新使用
      - /em/docker/emby管理:/compose
    
    environment:
      - TZ=Asia/Shanghai
      - PLAYBACK_DATA_MODE=sqlite # api 或 sqlite
      - DB_PATH=/emby-data/playback_reporting.db
      - DOCKER_UPDATE_COMPOSE_FILES=/compose/docker-compose.yml
      - DOCKER_UPDATE_NAME=emby-manger
