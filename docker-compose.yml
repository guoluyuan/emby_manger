version: '3.8'

services:
  emby-pulse:
    image: mp740429299/emby_manger:latest
    container_name: emby-pulse
    restart: unless-stopped
    
    # Host 模式：直接使用宿主机网络
    network_mode: host
    
    volumes:
      # 你的 Emby 数据真实路径
      - /volume1/docker/emby/data:/emby-data:ro
    
    environment:
      - TZ=Asia/Shanghai
      - PLAYBACK_DATA_MODE=sqlite # api 或 sqlite
      - DB_PATH=/emby-data/playback_reporting.db
